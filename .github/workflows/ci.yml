name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: ./mvnw -B -pl framework test

  ai-healing-demo:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: ./mvnw -B -pl examples/ai-healing-demo -am test -Dtest=MockAiHealingDemoTest
      - name: Demo summary
        if: always()
        run: |
          echo "AI healing mock demo — deterministic broken-locator + mock LLM test." >> "$GITHUB_STEP_SUMMARY"

  e2e-no-ai:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: ./mvnw -B clean verify -Pintegration-test -DskipTests -pl example-tests -am
      - name: Note AI status in job summary
        if: always()
        run: |
          echo "AI locator healing off — no ANTHROPIC_API_KEY was set for this job." >> "$GITHUB_STEP_SUMMARY"

  e2e-with-ai:
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Skip if no API key secret is configured
        if: ${{ env.ANTHROPIC_API_KEY == '' }}
        run: echo "No ANTHROPIC_API_KEY secret configured - skipping the AI-healing run." >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/setup-java@v4
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run with AI healing enabled
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        run: |
          ./mvnw -B clean verify -Pintegration-test -DskipTests -pl example-tests -am 2>&1 | tee ai-run.log
          echo '### AI locator healing cost' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -E "AI locator heal|healing session total" ai-run.log >> "$GITHUB_STEP_SUMMARY" || echo "No healing calls happened this run." >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
